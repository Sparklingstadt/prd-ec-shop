services:
  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/candyrain
    depends_on:
      - db

  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: candyrain
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/

volumes:
  db-data:
